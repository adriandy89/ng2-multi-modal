@if (blocking() && !minimized() && !loading()) {
  <div
    class="ng-modal-backdrop"
    [class]="'ng-modal-theme-' + resolvedTheme()"
    [style.z-index]="zIndex() - 1"
    (click)="onBackdropClick()"
  ></div>
}

<div
  #windowEl
  [class]="windowClasses()"
  [style]="windowStyle()"
  [hidden]="loading()"
  role="dialog"
  [attr.aria-modal]="blocking() ? 'true' : 'false'"
  [attr.aria-label]="ariaLabelText()"
  [attr.aria-labelledby]="titleTextId()"
  [attr.aria-describedby]="ariaDescribedBy()"
  tabindex="-1"
  (pointerdown)="onWindowPointerDown($event)"
  (pointermove)="onWindowPointerMove($event)"
  (keydown)="onKeydown($event)"
>
  <div
    #titleBar
    class="win-title-bar"
    [class.no-drag]="!draggable()"
    tabindex="0"
    (pointerdown)="onTitlePointerDown($event)"
    (dblclick)="maximize()"
  >
    <div class="title-name" [id]="titleId()">
      <ng-container *stringTemplateOutlet="icon()">
        @if (icon()) {
          <img class="icon" draggable="false" [src]="icon()" alt="" />
        }
      </ng-container>
      <ng-container *stringTemplateOutlet="title()">{{ title() }}</ng-container>
    </div>

    <div class="win-icons">
      @if (minimizable()) {
        <button
          type="button"
          class="win-icon minimize"
          [attr.aria-label]="locale().minimize"
          [title]="locale().minimize"
          (click)="minimize()"
        >
          <minimize-icon />
        </button>
      }
      @if (maximizable()) {
        @if (!maximized()) {
          <button
            type="button"
            class="win-icon maximize"
            [attr.aria-label]="locale().maximize"
            [title]="locale().maximize"
            (click)="maximize()"
          >
            <maximize-icon />
          </button>
        } @else {
          <button
            type="button"
            class="win-icon maximized"
            [attr.aria-label]="locale().restore"
            [title]="locale().windowMode"
            (click)="maximize()"
          >
            <maximized-icon />
          </button>
        }
      }
      @if (closable()) {
        <button
          type="button"
          class="win-icon close"
          [attr.aria-label]="locale().close"
          [title]="locale().close"
          (click)="close()"
        >
          <close-icon />
        </button>
      }
    </div>
  </div>

  <div class="body" [class.no-scroll]="!contentScrollable()" [style]="bodyStyle()">
    @if (content()) {
      <ng-container *stringTemplateOutlet="content()">{{ content() }}</ng-container>
    }
    <ng-container #contentHost />
    <ng-content />
  </div>
</div>

@if (loading()) {
  <div class="window-loading" [class]="'ng-modal-theme-' + resolvedTheme()">
    <div class="window-loading-spinner"><loading-icon /></div>
    <ng-container *stringTemplateOutlet="resolvedLoadingTip()">{{ resolvedLoadingTip() }}</ng-container>
  </div>
}
