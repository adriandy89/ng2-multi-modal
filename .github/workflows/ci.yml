name: CI

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  library:
    name: Build & test library (Angular 20)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - id: chrome
        uses: browser-actions/setup-chrome@v1

      - run: npm ci

      - name: Build library (styles + ng-packagr + patched exports)
        run: npm run build:lib

      - name: Unit tests (headless Chrome)
        run: npx ng test ng2-multi-modal --watch=false --browsers=ChromeHeadlessNoSandbox
        env:
          CHROME_BIN: ${{ steps.chrome.outputs.chrome-path }}

      - name: Pack the library tarball
        run: |
          mkdir -p "$GITHUB_WORKSPACE/pkg"
          cd dist/ng2-multi-modal && npm pack --pack-destination "$GITHUB_WORKSPACE/pkg"

      - name: Upload library tarball
        uses: actions/upload-artifact@v4
        with:
          name: pkg
          path: pkg/*.tgz

  compat:
    name: Consume in Angular ${{ matrix.angular }}
    needs: library
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        angular: [20, 21, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Download library tarball
        uses: actions/download-artifact@v4
        with:
          name: pkg
          path: pkg

      - name: Place tarball into the example
        run: cp pkg/*.tgz examples/ng${{ matrix.angular }}/ng2-multi-modal.tgz

      - name: Install example (Angular ${{ matrix.angular }})
        working-directory: examples/ng${{ matrix.angular }}
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Build example (proves the published package links on Angular ${{ matrix.angular }})
        working-directory: examples/ng${{ matrix.angular }}
        run: npm run build
